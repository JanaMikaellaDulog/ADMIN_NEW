<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imperial House - Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

  <div class="topbar">
    <div class="topbar-title">IMPERIAL HOUSE</div>
    <div class="topbar-items">
      <button class="topbar-item">⚙️</button>
      <button class="topbar-item">👤</button>
      <button class="topbar-item" onclick="openRightMenu()">Menu</button>
    </div>
  </div>

  <div id="rightMenu" class="right-menu">
    <div class="right-menu-header">
      <div class="right-menu-title">Navigation</div>
      <button class="right-menu-close" onclick="closeRightMenu()">✖</button>
    </div>
    <ul class="right-menu-nav">
      <li class="right-menu-item active" data-page="dashboard">DASHBOARD</li>
      <li class="right-menu-item" data-page="residents">RESIDENTS</li>
      <li class="right-menu-item" data-page="analytics">ANALYTICS</li>
      <li class="right-menu-item" data-page="reports">REPORTS</li>
    </ul>
  </div>
  <div id="rightMenuOverlay" class="right-menu-overlay" onclick="closeRightMenu()"></div>

  <main class="main-content">
    <section id="section-dashboard" class="app-page active-page">
      
      <div class="stats-ribbon">
        <div class="stat-card">
          <span class="stat-label">Global Residents</span>
          <span class="stat-value" id="stat-total-residents">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Active Connections</span>
          <span class="stat-value" id="stat-active-lots">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Receivables</span>
          <span class="stat-value" id="stat-total-money">₱ 0.00</span>
        </div>
      </div>

      <div class="location-selector-section">
        <h2 class="section-title">Project Selection</h2>
        <div class="selector-wrapper">
          <select id="locationSelect" class="clean-dropdown">
            <option value="" disabled selected>— Choose a Project Location —</option>
            <option value="STO.TOMAS PHASE 1">VIA VERDE STO.TOMAS PHASE 1</option>
            <option value="Imperial Meadows">Imperial Meadows</option>
            <option value="Brgy. Tartaria">Brgy. Tartaria</option>
            <option value="Rancho Imperial">Rancho Imperial</option>
            <option value="Tagaytay Meridien">Tagaytay Meridien</option>
            <option value="The Venetto Heights">The Venetto Heights</option>
            <option value="Trece Martires">Trece Martires</option>
            <option value="Padre Garcia">Padre Garcia</option>
            <option value="Priya Meridian">Priya Meridian</option>
            <option value="Brgy. STO.Domingo">Brgy. STO.Domingo</option>
            <option value="Brgy. Estanza">Brgy. Estanza</option>
            <option value="Homapon Legazpi City">Homapon Legazpi City</option>
            <option value="VHS PH 2">VHS PH 2</option>
            <option value="Sorsogon">Sorsogon</option>
            <option value="Buragwis">Buragwis</option>
            <option value="Estanza PH 1 & 2">Estanza PH 1 & 2</option>
            <option value="Estanza Phase 1">Estanza Phase 1</option>
            <option value="Iriga Phase 1">Iriga Phase 1</option>
            <option value="Labo">Labo</option>
            <option value="LeGrand 1 & 2">LeGrand 1 & 2</option>
            <option value="OLV Buragwis">OLV Buragwis</option>
            <option value="Polangui">Polangui</option>
            <option value="San Fernando">San Fernando</option>
          </select>
          <button class="primary-btn load-btn" onclick="handleLocationChange()">Load Project</button>
        </div>
      </div>

      <div class="map-wrapper">
        <div id="map-controls" style="display: none; justify-content: flex-end; margin-bottom: 10px;">
            <button class="danger-btn" onclick="window.closeMapSection()" style="padding: 8px 16px; font-weight: bold;">
                ✖ Close Map & Project Data
            </button>
        </div>
        <div id="mapContainer" style="display:none; height: 550px; border-radius: 15px;"></div>
      </div>

      <div id="project-analytics-box" class="analytics-container" style="display:none;">
        <h3 id="analytics-title">Project Insights</h3>
        <div class="charts-flex">
          <div class="chart-wrapper">
            <canvas id="populationChart"></canvas>
          </div>
          <div class="chart-wrapper">
            <canvas id="billingChart"></canvas>
          </div>
        </div>
      </div>
    </section>

    <section id="section-residents" class="app-page">
      <div class="page-header">
        <h2>Residents Management</h2>
      </div>
      <div class="residents-toolbar">
        <button class="primary-btn" onclick="openResidentForm()">+ Add Resident</button>
        <input type="text" id="residentSearch" placeholder="Search residents..." class="search-input">
      </div>
      <div class="residents-table-wrapper">
        <table class="residents-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Project</th>
              <th>Block</th>
              <th>Lot</th>
              <th>Status</th>
              <th>Electricity</th>
              <th>Water</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="residentsTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-container">
      <div class="modal-top-bar">
        <span id="modalTitle">Project Details</span>
        <button class="close-x" id="modalClose" style="background:none; border:none; color:white; font-size:22px; cursor:pointer;">✕</button>
      </div>
      <div class="modal-body" style="padding: 25px;">
        <div id="modalContent">
            </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="../javascript/residentsData.js"></script>
  <script src="../javascript/marker.js"></script>
  <script src="../javascript/residentsManagement.js"></script>
  <script src="../javascript/app.js"></script>
  <script src="../javascript/projectAnalytics.js"></script>
  
  <script src="../javascript/mapModal.js"></script> 
  
  <script src="../javascript/map.js"></script>

</body>
</html>
